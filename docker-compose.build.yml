# Build-context override for docker-compose.prod.yml
# Usage: docker compose -f docker-compose.prod.yml -f docker-compose.build.yml build
# This file adds build: contexts so EC2 can build all images from source.
# The API_BASE_URL is injected at build time via build args.
services:

  FarmersMK-api-gateway:
    image: regobert2004/farmersmk-api-gateway:latest
    build:
      context: services/farmersmk-api-gateway

  FarmersMK-admin-service:
    image: regobert2004/farmersmk-admin-service:latest
    build:
      context: services/farmersmk-admin-service

  FarmersMK-user-service:
    image: regobert2004/farmersmk-user-service:latest
    build:
      context: services/farmersmk-user-service

  FarmersMK-marketplace-service:
    image: regobert2004/farmersmk-marketplace-service:latest
    build:
      context: services/farmersmk-marketplace-service

  FarmersMK-notification-service:
    image: regobert2004/farmersmk-notification-service:latest
    build:
      context: services/farmersmk-notification-service

  FarmersMK-post-service:
    image: regobert2004/farmersmk-post-service:latest
    build:
      context: services/farmersmk-post-service

  FarmersMK-wallet-service:
    image: regobert2004/farmersmk-wallet-service:latest
    build:
      context: services/farmersmk-wallet-service

  FarmersMK-realtime-service:
    image: regobert2004/farmersmk-realtime-service:latest
    build:
      context: services/farmersmk-realtime-service

  FarmersMK-mastercard-service:
    image: regobert2004/farmersmk-mastercard-service:latest
    build:
      context: services/farmersmk-mastercard-service

  FarmersMK-visacard-service:
    image: regobert2004/farmersmk-visacard-service:latest
    build:
      context: services/farmersmk-VISAcard-service

  FarmersMK-mtnmobilemoney-service:
    image: regobert2004/farmersmk-mtnmobilemoney-service:latest
    build:
      context: services/farmersmk-mtnmobilemoney-service
      dockerfile: dockerfile

  FarmersMK-orangemoney-service:
    image: regobert2004/farmersmk-orangemoney-service:latest
    build:
      context: services/farmersmk-orangemoney-service

  FarmersMK-cryptocurrencywallet-service:
    image: regobert2004/farmersmk-cryptocurrencywallet-service:latest
    build:
      context: services/farmersmk-cryptocurrencywallet-service

  FarmersMK-socialmediafacebook-service:
    image: regobert2004/farmersmk-socialmediafacebook-service:latest
    build:
      context: services/farmersmk-socialmediafacebook-service

  FarmersMK-socialmediainstagram-service:
    image: regobert2004/farmersmk-socialmediainstagram-service:latest
    build:
      context: services/farmersmk-socialmediainstagram-service

  FarmersMK-socialmediatwitter-service:
    image: regobert2004/farmersmk-socialmediatwitter-service:latest
    build:
      context: services/farmersmk-socialmediatwitter-service

  FarmersMK-web:
    image: regobert2004/farmersmk-frontend-web:latest
    build:
      context: farmersmk-frontend-web
      args:
        VITE_API_BASE_URL: "${VITE_API_BASE_URL:-http://localhost:8080}"
        VITE_REALTIME_URL: "${VITE_REALTIME_URL:-ws://localhost:8080/ws}"
        VITE_SERVICE_HUB_URL: "${VITE_SERVICE_HUB_URL:-http://localhost/services.html}"
