server:
  port: 8080

spring:
  application:
    name: api-gateway

  cloud:
    gateway:
      routes:
        - id: user-service
          uri: http://FarmersMK-user-service:8083
          predicates:
            - Path=/users/**

        - id: admin-service
          uri: http://FarmersMK-admin-service:8082
          predicates:
            - Path=/admin/**

        - id: marketplace-service
          uri: http://FarmersMK-marketplace-service:8081
          predicates:
            - Path=/products/**

management:
  endpoints:
    web:
      exposure:
        include: "*"