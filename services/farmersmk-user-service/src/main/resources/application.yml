server:
  port: 8083

spring:
  application:
    name: user-service

  datasource:
    url: jdbc:h2:mem:user_db
    driver-class-name: org.h2.Driver
    username: sa
    password:

  jpa:
    database-platform: org.hibernate.dialect.H2Dialect
    hibernate:
      ddl-auto: update
    show-sql: true

  h2:
    console:
      enabled: true

jwt:
  secret: "FarmersMK-dev-secret-key-change-in-production-please"
  expiration-ms: 86400000