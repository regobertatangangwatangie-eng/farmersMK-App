server {
    listen 80;
    server_name localhost;

    proxy_http_version 1.1;
    proxy_set_header Host $host;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;

    # Single-link local service hub page
    location = / {
        root /usr/share/nginx/html;
        try_files /services.html =404;
    }

    location = /services {
        root /usr/share/nginx/html;
        try_files /services.html =404;
    }

    location = /services.html {
        root /usr/share/nginx/html;
        try_files /services.html =404;
    }

    # Frontend via one link
    location /ui {
        proxy_pass http://farmpro-frontend:80;
    }

    # API Gateway via one link
    location /gateway {
        proxy_pass http://farmpro-api-gateway:8080;
    }

    # Core services
    location /users {
        proxy_pass http://farmpro-user-service:8083;
    }

    location /admin {
        proxy_pass http://farmpro-admin-service:8082;
    }

    location /products {
        proxy_pass http://farmpro-marketplace-service:8081;
    }

    location /posts {
        proxy_pass http://farmpro-post-service:8085;
    }

    location /wallets {
        proxy_pass http://farmpro-wallet-service:8084;
    }

    location /api/notifications {
        proxy_pass http://farmpro-notification-service:8083;
    }

    # Payment and crypto services
    location /api/mastercard {
        proxy_pass http://farmpro-mastercard-service:8090;
    }

    location /api/visacard {
        proxy_pass http://farmpro-visacard-service:8087;
    }

    location /mtn {
        proxy_pass http://farmpro-mtnmobilemoney-service:8088;
    }

    location /orangemoney {
        proxy_pass http://farmpro-orangemoney-service:8089;
    }

    location /api/crypto {
        proxy_pass http://farmpro-cryptocurrencywallet-service:8088;
    }

    # Social media services
    location /facebook {
        proxy_pass http://farmpro-socialmediafacebook-service:8080;
    }

    location /api/instagram {
        proxy_pass http://farmpro-socialmediainstagram-service:8090;
    }

    location /twitter {
        proxy_pass http://farmpro-socialmediatwitter-service:8090;
    }

    # Realtime websocket endpoint
    location /ws {
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_pass http://farmpro-realtime-service:8087;
    }
}
