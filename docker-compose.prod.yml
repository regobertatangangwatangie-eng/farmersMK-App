# ─────────────────────────────────────────────────────────────
# farmersmk – Production stack
# Target: AWS EC2 instances farmersmk.com and farmersmk.com1
# Usage: docker compose -f docker-compose.prod.yml up -d
# All images are pulled from Docker Hub: regobert2004/*
# ─────────────────────────────────────────────────────────────

networks:
  FarmersMK-net:
    driver: bridge

volumes:
  postgres-data:
  redis-data:

services:

  # ── Infrastructure ──────────────────────────────────────────

  postgres:
    image: postgres:16-alpine
    container_name: FarmersMK-postgres
    environment:
      POSTGRES_USER: FarmersMK
      POSTGRES_PASSWORD: FarmersMK_secret
      POSTGRES_DB: FarmersMKdb
    volumes:
      - postgres-data:/var/lib/postgresql/data
    networks: [FarmersMK-net]
    restart: always
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U FarmersMK"]
      interval: 10s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    container_name: FarmersMK-redis
    volumes:
      - redis-data:/data
    networks: [FarmersMK-net]
    restart: always
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ── Backend microservices ────────────────────────────────────

  farmersmk-api-gateway:
    image: regobert2004/farmersmk-api-gateway:latest
    container_name: farmersmk-api-gateway
    ports:
      - "8080:8080"
    environment:
      SPRING_PROFILES_ACTIVE: prod
      SPRING_REDIS_HOST: redis
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    networks: [FarmersMK-net]
    restart: always

  farmersmk-admin-service:
    image: regobert2004/farmersmk-admin-service:latest
    container_name: farmersmk-admin-service
    ports:
      - "8081:8080"
    environment:
      SPRING_PROFILES_ACTIVE: prod
    depends_on:
      postgres:
        condition: service_healthy
    networks: [FarmersMK-net]
    restart: always

  farmersmk-user-service:
