# ─────────────────────────────────────────────────────────────
# FARMERPRO – Production stack
# Target: AWS EC2 instances FARMERPRO-APP and FARMERPRO-APP1
# Usage: docker compose -f docker-compose.prod.yml up -d
# All images are pulled from Docker Hub: regobert2004/*
# ─────────────────────────────────────────────────────────────

networks:
  farmpro-net:
    driver: bridge

volumes:
  postgres-data:
  redis-data:

services:

  # ── Infrastructure ──────────────────────────────────────────

  postgres:
    image: postgres:16-alpine
    container_name: farmpro-postgres
    environment:
      POSTGRES_USER: farmpro
      POSTGRES_PASSWORD: farmpro_secret
      POSTGRES_DB: farmprodb
    volumes:
      - postgres-data:/var/lib/postgresql/data
    networks: [farmpro-net]
    restart: always
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U farmpro"]
      interval: 10s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    container_name: farmpro-redis
    volumes:
      - redis-data:/data
    networks: [farmpro-net]
    restart: always
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ── Backend microservices ────────────────────────────────────

  farmpro-api-gateway:
    image: regobert2004/farmpro-api-gateway:latest
    container_name: farmpro-api-gateway
    ports:
      - "8080:8080"
    environment:
      SPRING_PROFILES_ACTIVE: prod
      SPRING_REDIS_HOST: redis
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    networks: [farmpro-net]
    restart: always

  farmpro-admin-service:
    image: regobert2004/farmpro-admin-service:latest
    container_name: farmpro-admin-service
    ports:
      - "8081:8080"
    environment:
      SPRING_PROFILES_ACTIVE: prod
    depends_on:
      postgres:
        condition: service_healthy
    networks: [farmpro-net]
    restart: always

  farmpro-user-service:
    image: regobert2004/farmpro-user-service:latest
    container_name: farmpro-user-service
    ports:
      - "8082:8080"
    environment:
      SPRING_PROFILES_ACTIVE: prod
