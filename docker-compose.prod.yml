  # ── Web frontend ─────────────────────────────────────────────

  farmpro-web:
    image: regobert2004/farmpro-web:latest
    container_name: farmpro-web
    ports:
      - "80:80"
    networks: [farmpro-net]
    restart: always
    depends_on:
      - farmpro-api-gateway
