- hosts: all
  become: yes
  tasks:
    - name: Install Docker
      apt:
        name: docker.io
        state: present
        update_cache: yes

    - name: Add user to docker group
      user:
        name: ubuntu
        groups: docker
        append: yes

    - name: Copy docker-compose.local.yml
      copy:
        src: ../../docker-compose.local.yml
        dest: /home/ubuntu/docker-compose.yml
        owner: ubuntu
        group: ubuntu
        mode: 0644

    - name: Copy app source (optional, or use git clone)
      synchronize:
        src: ../../
        dest: /home/ubuntu/farmersmk-app/
        rsync_opts:
          - "--exclude=.git"
          - "--exclude=target"
          - "--exclude=node_modules"

    - name: Start app with Docker Compose
      become_user: ubuntu
      shell: |
        cd /home/ubuntu/farmersmk-app
        docker compose up -d --build
