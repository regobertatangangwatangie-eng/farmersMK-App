name: FarmersMK CI/CD

on:
  push:
    branches: [ master ]
  pull_request:
    branches: [ master ]

jobs:
  discover:
    runs-on: ubuntu-latest
    outputs:
      services: ${{ steps.set.outputs.services }}
    steps:
      - uses: actions/checkout@v4
      - id: set
        shell: bash
        run: |
          services=$(find services -mindepth 1 -maxdepth 1 -type d -name 'farmersmk-*' -exec test -f '{}/pom.xml' ';' -print | xargs -r -n1 basename | sort | jq -R -s -c 'split("\n")[:-1]')
          echo "services=${services}" >> "$GITHUB_OUTPUT"

  frontend-web-check:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20.19.4'
          cache: npm
          cache-dependency-path: farmersmk-frontend-web/package-lock.json
      - name: Build web frontend
        working-directory: farmersmk-frontend-web
        env:
          VITE_API_BASE_URL: https://api.example.com
          VITE_REALTIME_URL: wss://api.example.com/ws
          VITE_SERVICE_HUB_URL: https://api.example.com/services.html
        run: |
          npm ci
          npm run build

  android-config-check:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20.19.4'
          cache: npm
          cache-dependency-path: farmersmk-android-app/package-lock.json
      - name: Validate Android Expo public config
        working-directory: farmersmk-android-app
        env:
          EXPO_PUBLIC_API_BASE_URL: https://api.example.com
        run: |
          npm ci
          npx expo config --type public

  build-test:
    needs: discover
    if: ${{ needs.discover.outputs.services != '[]' }}
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        service: ${{ fromJson(needs.discover.outputs.services) }}
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '21'
      - name: Build and test
        working-directory: services/${{ matrix.service }}
        run: |
          if [ -f pom.xml ]; then
            mvn -B -ntp clean test
          else
            echo "No pom.xml for ${{ matrix.service }}, skipping"
          fi

  docker:
    needs: [discover, build-test, frontend-web-check, android-config-check]
    if: github.ref == 'refs/heads/master' && needs.discover.outputs.services != '[]'
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        service: ${{ fromJson(needs.discover.outputs.services) }}
    steps:
      - uses: actions/checkout@v4
      - uses: docker/setup-buildx-action@v3
      - uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}
      - name: Build and push image
        working-directory: services/${{ matrix.service }}
        run: |
          if [ -f Dockerfile ]; then
            docker build -t ${{ secrets.DOCKERHUB_USERNAME }}/${{ matrix.service }}:latest .
            docker push ${{ secrets.DOCKERHUB_USERNAME }}/${{ matrix.service }}:latest
          else
            echo "No Dockerfile for ${{ matrix.service }}, skipping"
          fi
