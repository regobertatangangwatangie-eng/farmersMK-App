- name: Install Docker from distro package when available
  block:
    - name: Install Docker package
      ansible.builtin.package:
        name: "{{ docker_package_name }}"
        state: present
      vars:
        docker_package_name: "{{ 'docker.io' if ansible_os_family == 'Debian' else 'docker' }}"
  rescue:
    - name: Install Docker using official convenience script fallback
      ansible.builtin.shell: |
        set -e
        curl -fsSL https://get.docker.com | sh
      args:
        executable: /bin/bash

- name: Start and enable Docker service
  ansible.builtin.service:
    name: docker
    enabled: true
    state: started

- name: Install docker compose plugin directory
  ansible.builtin.file:
    path: /usr/local/lib/docker/cli-plugins
    state: directory
    mode: "0755"

- name: Install Docker Compose plugin
  ansible.builtin.get_url:
    url: https://github.com/docker/compose/releases/download/v2.27.0/docker-compose-linux-x86_64
    dest: /usr/local/lib/docker/cli-plugins/docker-compose
    mode: "0755"
