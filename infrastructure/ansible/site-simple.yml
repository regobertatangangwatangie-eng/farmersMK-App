---
- name: Configure FarmersMK servers
  hosts: FarmersMK
  become: true
  gather_facts: false

  tasks:
    - name: Ping target
      ansible.builtin.ping:

    - name: Gather package manager facts
      ansible.builtin.setup:
        gather_subset:
          - "!all"
          - "min"

    - name: Install base packages
      ansible.builtin.package:
        name:
          - git
          - curl
          - unzip
          - tar
          - htop
        state: present

    - name: Create app base directory
      ansible.builtin.file:
        path: /opt/farmersmk
        state: directory
        mode: "0755"

    - name: Install Docker
      ansible.builtin.package:
        name: docker
        state: present

    - name: Enable and start Docker service
      ansible.builtin.service:
        name: docker
        state: started
        enabled: true

    - name: Install Docker Compose
      ansible.builtin.get_url:
        url: "https://github.com/docker/compose/releases/download/v2.27.0/docker-compose-linux-x86_64"
        dest: /usr/local/bin/docker-compose
        mode: "0755"

    - name: Checkout repository
      ansible.builtin.git:
        repo: "https://github.com/regobertatangangwatangie-eng/farmersmk.com.git"
        dest: /opt/farmersmk
        version: master
        update: true

    - name: Add ec2-user to docker group
      ansible.builtin.user:
        name: ec2-user
        groups: docker
        append: true

    - name: Start farmersmk stack (prod compose)
      ansible.builtin.shell: |
        set -e
        cd /opt/farmersmk
        # Choose best available compose file
        for f in docker-compose.prod.yml docker-compose.local.yml docker-compose.yml; do
          if [ -f "$f" ]; then
            docker compose -p farmersmk -f "$f" up -d --build
            break
          fi
        done
      args:
        executable: /bin/bash
