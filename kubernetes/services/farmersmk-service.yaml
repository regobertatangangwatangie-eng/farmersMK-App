# farmersmk-api-gateway — NodePort so it is reachable directly on the k3s host
# Access: http://<k3s-host>:30080
apiVersion: v1
kind: Service
metadata:
  name: farmersmk-api-gateway
  namespace: farmersmk
  labels:
    app: farmersmk-api-gateway
spec:
  selector:
    app: farmersmk-api-gateway
  ports:
    - protocol: TCP
      port: 8080
      targetPort: 8080
      nodePort: 30080
  type: NodePort
