# farmersmk-frontend-web NodePort service — reachable at http://<k3s-host>:30000
apiVersion: v1
kind: Service
metadata:
  name: farmersmk-frontend-web
  namespace: farmersmk
  labels:
    app: farmersmk-frontend-web
spec:
  selector:
    app: farmersmk-frontend-web
  ports:
    - protocol: TCP
      port: 80
      targetPort: 80
      nodePort: 30000
  type: NodePort
