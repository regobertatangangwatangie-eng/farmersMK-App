# farmersMK ingress — requires nginx-ingress controller
# k3s: kubectl apply -f https://raw.githubusercontent.com/kubernetes/ingress-nginx/controller-v1.10.1/deploy/static/provider/baremetal/deploy.yaml
#
# Two virtual hosts:
#   api.farmersmk-app.com  →  api-gateway (all backend traffic)
#   farmersmk-app.com      →  frontend-web (SPA)
#
# DNS: Cloudflare A record → 3.231.147.163 (k3s EC2) ✓ DONE
# SSL: Cloudflare proxy handles TLS termination (Full SSL mode)
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: farmersmk-ingress
  namespace: farmersmk
  annotations:
    nginx.ingress.kubernetes.io/rewrite-target: /
    # WebSocket support for realtime-service (proxied through api-gateway)
    nginx.ingress.kubernetes.io/proxy-read-timeout: "3600"
    nginx.ingress.kubernetes.io/proxy-send-timeout: "3600"
    nginx.ingress.kubernetes.io/proxy-http-version: "1.1"
    nginx.ingress.kubernetes.io/proxy-set-headers: ""
    nginx.ingress.kubernetes.io/websocket-services: "farmersmk-realtime-service"
spec:
  ingressClassName: nginx
  rules:
    # ── API Gateway (all microservice traffic) ──────────────────────────────
    - host: api.farmersmk-app.com
      http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: farmersmk-api-gateway
                port:
                  number: 8080
    # ── Web Frontend (SPA) ──────────────────────────────────────────────────
    - host: farmersmk-app.com
      http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: farmersmk-frontend-web
                port:
                  number: 80
