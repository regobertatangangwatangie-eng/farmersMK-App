# Payment service group: wallet, mastercard, visacard, mtnmobilemoney, orangemoney, cryptocurrencywallet
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: farmersmk-wallet-service
  namespace: farmersmk
  labels:
    app: farmersmk-wallet-service
    tier: payment
spec:
  replicas: 1
  selector:
    matchLabels:
      app: farmersmk-wallet-service
  template:
    metadata:
      labels:
        app: farmersmk-wallet-service
    spec:
      containers:
        - name: farmersmk-wallet-service
          image: regobert2004/farmersmk-wallet-service:latest
          imagePullPolicy: Always
          ports:
            - containerPort: 8084
          env:
            - name: SPRING_PROFILES_ACTIVE
              value: "prod"
          resources:
            requests:
              cpu: "50m"
              memory: "64Mi"
            limits:
              cpu: "300m"
              memory: "256Mi"
          readinessProbe:
            httpGet:
              path: /actuator/health
              port: 8084
            initialDelaySeconds: 20
            periodSeconds: 10
            failureThreshold: 3
          livenessProbe:
            httpGet:
              path: /actuator/health
              port: 8084
            initialDelaySeconds: 40
            periodSeconds: 20
            failureThreshold: 3
