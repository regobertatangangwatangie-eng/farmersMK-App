# farmersmk-api-gateway — Spring Cloud Gateway (entry point for all backend traffic)
apiVersion: apps/v1
kind: Deployment
metadata:
  name: farmersmk-api-gateway
  namespace: farmersmk
  labels:
    app: farmersmk-api-gateway
    tier: gateway
spec:
  replicas: 1
  selector:
    matchLabels:
      app: farmersmk-api-gateway
  template:
    metadata:
      labels:
        app: farmersmk-api-gateway
        tier: gateway
    spec:
      containers:
        - name: farmersmk-api-gateway
          image: regobert2004/farmersmk-api-gateway:latest
          imagePullPolicy: Always
          ports:
            - containerPort: 8080
          env:
            - name: SPRING_PROFILES_ACTIVE
              value: "prod"
            # K8s service DNS overrides (defaults in application.yml point to Docker Compose names)
            - name: USER_SERVICE_URL
              value: "http://farmersmk-user-service:8083"
            - name: ADMIN_SERVICE_URL
              value: "http://farmersmk-admin-service:8082"
            - name: MARKETPLACE_SERVICE_URL
              value: "http://farmersmk-marketplace-service:8081"
            - name: NOTIFICATION_SERVICE_URL
              value: "http://farmersmk-notification-service:8083"
            - name: POST_SERVICE_URL
              value: "http://farmersmk-post-service:8085"
            - name: WALLET_SERVICE_URL
              value: "http://farmersmk-wallet-service:8084"
            - name: REALTIME_SERVICE_URL
              value: "http://farmersmk-realtime-service:8087"
            - name: MASTERCARD_SERVICE_URL
              value: "http://farmersmk-mastercard-service:8090"
            - name: VISACARD_SERVICE_URL
              value: "http://farmersmk-visacard-service:8087"
            - name: MTN_SERVICE_URL
              value: "http://farmersmk-mtnmobilemoney-service:8088"
            - name: ORANGE_SERVICE_URL
              value: "http://farmersmk-orangemoney-service:8089"
            - name: CRYPTO_SERVICE_URL
              value: "http://farmersmk-cryptocurrencywallet-service:8088"
            - name: FACEBOOK_SERVICE_URL
              value: "http://farmersmk-socialmediafacebook-service:8080"
            - name: INSTAGRAM_SERVICE_URL
              value: "http://farmersmk-socialmediainstagram-service:8090"
            - name: TWITTER_SERVICE_URL
              value: "http://farmersmk-socialmediatwitter-service:8090"
          resources:
            requests:
              cpu: "100m"
              memory: "128Mi"
            limits:
              cpu: "500m"
              memory: "384Mi"
          readinessProbe:
            httpGet:
              path: /actuator/health
              port: 8080
            initialDelaySeconds: 20
            periodSeconds: 10
            timeoutSeconds: 3
            failureThreshold: 3
          livenessProbe:
            httpGet:
              path: /actuator/health
              port: 8080
            initialDelaySeconds: 40
            periodSeconds: 20
            timeoutSeconds: 3
            failureThreshold: 3
