apiVersion: apps/v1
kind: Deployment
metadata:
  name: farmpro-sample-service
  labels:
    app: farmpro-sample-service
spec:
  replicas: 2
  selector:
    matchLabels:
      app: farmpro-sample-service
  template:
    metadata:
      labels:
        app: farmpro-sample-service
    spec:
      containers:
        - name: app
          image: your-dockerhub-user/farmpro-sample-service:latest
          ports:
            - containerPort: 8080
          resources:
            requests:
              cpu: "250m"
              memory: "256Mi"
            limits:
              cpu: "500m"
              memory: "512Mi"
          startupProbe:
            httpGet:
              path: /actuator/health
              port: 8080
            periodSeconds: 10
            failureThreshold: 30
          readinessProbe:
            httpGet:
              path: /actuator/health
              port: 8080
            initialDelaySeconds: 10
            periodSeconds: 10
            timeoutSeconds: 3
            failureThreshold: 3
          livenessProbe:
            httpGet:
              path: /actuator/health
              port: 8080
            initialDelaySeconds: 30
            periodSeconds: 20
            timeoutSeconds: 3
            failureThreshold: 3
          env:
            - name: SPRING_PROFILES_ACTIVE
              value: "prod"
