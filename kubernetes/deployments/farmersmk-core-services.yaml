# Core backend microservices: user-service, admin-service, marketplace-service
# These are the services wired into the api-gateway routes.
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: farmersmk-user-service
  namespace: farmersmk
  labels:
    app: farmersmk-user-service
    tier: backend
spec:
  replicas: 1
  selector:
    matchLabels:
      app: farmersmk-user-service
  template:
    metadata:
      labels:
        app: farmersmk-user-service
    spec:
      containers:
        - name: farmersmk-user-service
          image: regobert2004/farmersmk-user-service:latest
          imagePullPolicy: Always
          ports:
            - containerPort: 8083
          env:
            - name: SPRING_PROFILES_ACTIVE
              value: "prod"
          resources:
            requests:
              cpu: "50m"
              memory: "64Mi"
            limits:
              cpu: "300m"
              memory: "256Mi"
          readinessProbe:
            httpGet:
              path: /actuator/health
              port: 8083
            initialDelaySeconds: 20
            periodSeconds: 10
            failureThreshold: 3
          livenessProbe:
            httpGet:
              path: /actuator/health
              port: 8083
            initialDelaySeconds: 40
            periodSeconds: 20
            failureThreshold: 3
