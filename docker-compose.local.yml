# ─────────────────────────────────────────────
# FARMERPRO – Local development stack
# Usage:  docker compose -f docker-compose.local.yml up --build
# Ports:
#   http://localhost       → Frontend (React / Vite)
#   http://localhost/api/* → API gateway (routed by nginx)
#   http://localhost:8761  → Eureka dashboard (discovery)
# ─────────────────────────────────────────────

networks:
  farmpro-net:
    driver: bridge

volumes:
  postgres-data:
  redis-data:

services:

  # ── Infrastructure ──────────────────────────

  postgres:
    image: postgres:16-alpine
    container_name: farmpro-postgres
    environment:
      POSTGRES_USER: farmpro
      POSTGRES_PASSWORD: farmpro_secret
      POSTGRES_DB: farmprodb
    volumes:
      - postgres-data:/var/lib/postgresql/data
    networks: [farmpro-net]
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U farmpro"]
      interval: 10s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    container_name: farmpro-redis
    volumes:
      - redis-data:/data
    networks: [farmpro-net]
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ── Backend microservices ───────────────────

  farmpro-api-gateway:
    build:
      context: ./services/farmpro-api-gateway
      dockerfile: Dockerfile
    container_name: farmpro-api-gateway
    ports:
      - "8080:8080"
    environment:
      SPRING_PROFILES_ACTIVE: local
      SPRING_REDIS_HOST: redis
    depends_on:
      postgres:
        condition: service_healthy
    networks: [farmpro-net]
    restart: on-failure

  farmpro-admin-service:
    build:
      context: ./services/farmpro-admin-service
      dockerfile: Dockerfile
    container_name: farmpro-admin-service
    ports:
      - "8081:8082"
    environment:
      SPRING_PROFILES_ACTIVE: local
    depends_on:
      postgres:
        condition: service_healthy
    networks: [farmpro-net]
    restart: on-failure

  farmpro-user-service:
