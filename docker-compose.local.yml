  farmersmk-socialmediatwitter-service:
    build:
      context: .
      dockerfile: services/FarmersMK-socialmediatwitter-service/Dockerfile
    container_name: farmersmk-socialmediatwitter-service
    ports:
      - "8095:8090"
    environment:
      SPRING_PROFILES_ACTIVE: local
    networks: [farmersmk-net]
    restart: on-failure

  # ── Frontend ────────────────────────────────

  farmersmk-frontend:
    build:
      context: ./FarmersMK-frontend-web
      dockerfile: Dockerfile
      args:
        VITE_API_BASE_URL: ${VITE_API_BASE_URL:-http://98.84.28.135:8080}
        VITE_REALTIME_URL: ${VITE_REALTIME_URL:-ws://98.84.28.135:8080/ws}
        VITE_SERVICE_HUB_URL: ${VITE_SERVICE_HUB_URL:-http://98.84.28.135/services.html}
    container_name: farmersmk-frontend
    ports:
      - "3000:80"
    networks: [farmersmk-net]
    depends_on:
      - farmersmk-api-gateway

  # ── Reverse proxy (entry point) ─────────────

  nginx:
    image: nginx:1.27-alpine
    container_name: farmersmk-nginx
    ports:
      - "80:80"
    volumes:
      - ./docker/nginx/local.conf:/etc/nginx/conf.d/default.conf:ro
      - ./docker/nginx/services.html:/usr/share/nginx/html/services.html:ro
    networks: [farmersmk-net]
    depends_on:
      - farmersmk-frontend
      - farmersmk-api-gateway
    restart: on-failure
