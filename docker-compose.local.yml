    networks: [farmersmk-net]
    restart: on-failure

  farmersmk-marketplace-service:
    build:
      context: .
      dockerfile: services/FarmersMK-marketplace-service/Dockerfile
    container_name: farmersmk-marketplace-service
    ports:
      - "8083:8081"
    environment:
      SPRING_PROFILES_ACTIVE: local
