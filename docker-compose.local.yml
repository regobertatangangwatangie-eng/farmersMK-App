    environment:
      SPRING_PROFILES_ACTIVE: local
    networks: [farmpro-net]
    restart: on-failure

  # ── Frontend ────────────────────────────────

  farmpro-frontend:
    build:
      context: ./farmpro-frontend-web
      dockerfile: Dockerfile
      args:
        VITE_API_BASE_URL: ${VITE_API_BASE_URL:-http://98.84.28.135:8080}
        VITE_REALTIME_URL: ${VITE_REALTIME_URL:-ws://98.84.28.135:8080/ws}
        VITE_SERVICE_HUB_URL: ${VITE_SERVICE_HUB_URL:-http://98.84.28.135/services.html}
    container_name: farmpro-frontend
    ports:
      - "3000:80"
    networks: [farmpro-net]
    depends_on:
      - farmpro-api-gateway

  # ── Reverse proxy (entry point) ─────────────

  nginx:
    image: nginx:1.27-alpine
    container_name: farmpro-nginx
    ports:
      - "80:80"
    volumes:
      - ./docker/nginx/local.conf:/etc/nginx/conf.d/default.conf:ro
      - ./docker/nginx/services.html:/usr/share/nginx/html/services.html:ro
    networks: [farmpro-net]
    depends_on:
      - farmpro-frontend
      - farmpro-api-gateway
    restart: on-failure
