# ─────────────────────────────────────────────
# farmersmk – Local development stack
# Usage:  docker compose -f docker-compose.local.yml up --build
# Ports:
#   http://localhost       → Frontend (React / Vite)
#   http://localhost/api/* → API gateway (routed by nginx)
#   http://localhost:8761  → Eureka dashboard (discovery)
# ─────────────────────────────────────────────

networks:
  farmersmk-net:
    driver: bridge

volumes:
  postgres-data:
  redis-data:

services:

  # ── Infrastructure ──────────────────────────

  postgres:
    image: postgres:16-alpine
    container_name: FarmersMK-postgres
    environment:
      POSTGRES_USER: FarmersMK
      POSTGRES_PASSWORD: FarmersMK_secret
      POSTGRES_DB: FarmersMKdb
    volumes:
      - postgres-data:/var/lib/postgresql/data
    networks: [farmersmk-net]
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U FarmersMK"]
      interval: 10s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    container_name: FarmersMK-redis
    volumes:
      - redis-data:/data
    networks: [farmersmk-net]
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ── Backend microservices ───────────────────

  farmersmk-api-gateway:
    build:
      context: .
      dockerfile: services/FarmersMK-api-gateway/Dockerfile
    container_name: farmersmk-api-gateway
    ports:
      - "8080:8080"
    environment:
      SPRING_PROFILES_ACTIVE: local
      SPRING_REDIS_HOST: redis
    depends_on:
      postgres:
        condition: service_healthy
    networks: [farmersmk-net]
    restart: on-failure

  farmersmk-admin-service:
    build:
      context: .
      dockerfile: services/FarmersMK-admin-service/Dockerfile
    container_name: farmersmk-admin-service
    ports:
      - "8081:8082"
    environment:
      SPRING_PROFILES_ACTIVE: local
    depends_on:
      postgres:
        condition: service_healthy
    networks: [farmersmk-net]
    restart: on-failure

  farmersmk-user-service:
    build:
      context: .
      dockerfile: services/FarmersMK-user-service/Dockerfile
    container_name: farmersmk-user-service
    ports:
      - "8082:8083"
    environment:
      SPRING_PROFILES_ACTIVE: local
    depends_on:
      postgres:
