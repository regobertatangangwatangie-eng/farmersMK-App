    networks: [farmersmk-net]
    restart: on-failure

  farmersmk-notification-service:
    build:
      context: .
      dockerfile: services/FarmersMK-notification-service/Dockerfile
    container_name: farmersmk-notification-service
    ports:
      - "8084:8083"
    environment:
      SPRING_PROFILES_ACTIVE: local
      SPRING_REDIS_HOST: redis
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    networks: [farmersmk-net]
    restart: on-failure

  farmersmk-post-service:
