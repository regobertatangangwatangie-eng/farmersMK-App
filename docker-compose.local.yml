      dockerfile: Dockerfile
    container_name: farmpro-notification-service
    ports:
      - "8084:8083"
    environment:
      SPRING_PROFILES_ACTIVE: local
      SPRING_REDIS_HOST: redis
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    networks: [farmpro-net]
    restart: on-failure

  farmpro-post-service:
