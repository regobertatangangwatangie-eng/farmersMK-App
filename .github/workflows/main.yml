name: FarmersMK Monorepo CI/CD

on:
  push:
    branches: [master, main]
  pull_request:
    branches: [master, main]

jobs:
  discover:
    runs-on: ubuntu-latest
    outputs:
      services: ${{ steps.set.outputs.services }}
    steps:
      - uses: actions/checkout@v4
      - id: set
        shell: bash
        run: |
          services=$(find services -mindepth 1 -maxdepth 1 -type d -name 'farmersmk-*' -exec test -f '{}/pom.xml' ';' -print | xargs -r -n1 basename | sort | jq -R -s -c 'split("\n")[:-1]')
          echo "services=${services}" >> "$GITHUB_OUTPUT"

  build-test:
    needs: discover
    if: ${{ needs.discover.outputs.services != '[]' }}
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        service: ${{ fromJson(needs.discover.outputs.services) }}
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '21'
          cache: maven
      - name: Configure Maven mirror
        run: |
          mkdir -p ~/.m2
          cat > ~/.m2/settings.xml << 'SETTINGS_EOF'
          <settings xmlns="http://maven.apache.org/SETTINGS/1.0.0"
                    xmlns:xsi="http://www.w3.org/2001/XMLSchema-instance"
                    xsi:schemaLocation="http://maven.apache.org/SETTINGS/1.0.0 https://maven.apache.org/xsd/settings-1.0.0.xsd">
            <mirrors>
              <mirror>
                <id>central-repo1</id>
                <name>Maven Central via repo1</name>
                <url>https://repo1.maven.org/maven2</url>
                <mirrorOf>central</mirrorOf>
              </mirror>
            </mirrors>
          </settings>
          SETTINGS_EOF
      - name: Build and test
        working-directory: services/${{ matrix.service }}
        run: |
          if [ -f pom.xml ]; then
            mvn -B -ntp -Dmaven.wagon.http.retryHandler.count=3 -Dmaven.wagon.http.pool=false clean test
          else
            echo "No pom.xml for ${{ matrix.service }}, skipping"
          fi

  docker:
    needs: [discover, build-test]
    if: github.ref == 'refs/heads/master' && needs.discover.outputs.services != '[]'
    runs-on: ubuntu-latest
    env:
      DOCKER_REGISTRY_USER: ${{ secrets.DOCKERHUB_USERNAME || secrets.DOCKER_USERNAME }}
      DOCKER_REGISTRY_TOKEN: ${{ secrets.DOCKERHUB_TOKEN || secrets.DOCKER_PASSWORD }}
    strategy:
      fail-fast: false
      matrix:
        service: ${{ fromJson(needs.discover.outputs.services) }}
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '21'
          cache: maven
      - name: Configure Maven mirror
        run: |
          mkdir -p ~/.m2
          cat > ~/.m2/settings.xml << 'SETTINGS_EOF'
          <settings xmlns="http://maven.apache.org/SETTINGS/1.0.0"
                    xmlns:xsi="http://www.w3.org/2001/XMLSchema-instance"
                    xsi:schemaLocation="http://maven.apache.org/SETTINGS/1.0.0 https://maven.apache.org/xsd/settings-1.0.0.xsd">
            <mirrors>
              <mirror>
                <id>central-repo1</id>
                <name>Maven Central via repo1</name>
                <url>https://repo1.maven.org/maven2</url>
                <mirrorOf>central</mirrorOf>
              </mirror>
            </mirrors>
          </settings>
          SETTINGS_EOF
      - uses: docker/setup-buildx-action@v3
      - id: docker-login
        continue-on-error: true
        if: env.DOCKER_REGISTRY_USER != '' && env.DOCKER_REGISTRY_TOKEN != ''
        uses: docker/login-action@v3
        with:
          username: ${{ env.DOCKER_REGISTRY_USER }}
          password: ${{ env.DOCKER_REGISTRY_TOKEN }}

      - name: Package service for Docker context
        working-directory: services/${{ matrix.service }}
        run: |
          if [ -f pom.xml ]; then
            mvn -B -ntp -DskipTests -Dmaven.wagon.http.retryHandler.count=3 -Dmaven.wagon.http.pool=false package
          else
            echo "No pom.xml for ${{ matrix.service }}, skipping package"
          fi

      - name: Build image
        working-directory: services/${{ matrix.service }}
        run: |
          svc_lower=$(echo "${{ matrix.service }}" | tr '[:upper:]' '[:lower:]')
          dockerfile=""
          if [ -f Dockerfile ]; then
            dockerfile="Dockerfile"
          elif [ -f dockerfile ]; then
            dockerfile="dockerfile"
          fi

          if [ -n "$dockerfile" ]; then
            docker build -f "$dockerfile" -t FarmersMK-local/${svc_lower}:latest .
          else
            echo "No Dockerfile/dockerfile for ${{ matrix.service }}, skipping"
          fi

      - name: Retag image for Docker Hub
        if: steps.docker-login.outcome == 'success'
        working-directory: services/${{ matrix.service }}
        run: |
          svc_lower=$(echo "${{ matrix.service }}" | tr '[:upper:]' '[:lower:]')
          docker tag FarmersMK-local/${svc_lower}:latest ${{ env.DOCKER_REGISTRY_USER }}/${svc_lower}:latest

      - name: Push image
        if: steps.docker-login.outcome == 'success'
        run: |
          svc_lower=$(echo "${{ matrix.service }}" | tr '[:upper:]' '[:lower:]')
          docker push ${{ env.DOCKER_REGISTRY_USER }}/${svc_lower}:latest

      - name: Skip push notice
        if: steps.docker-login.outcome != 'success'
        run: |
          echo "Docker login was not successful (missing or invalid secrets)."
          echo "Build completed; image push skipped for ${{ matrix.service }}."

  frontend-web:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: npm
          cache-dependency-path: farmersmk-frontend-web/package-lock.json
      - name: Build web frontend
        working-directory: farmersmk-frontend-web
        env:
          VITE_API_BASE_URL: http://98.84.28.135:8080
          VITE_REALTIME_URL: ws://98.84.28.135:8080/ws
          VITE_SERVICE_HUB_URL: http://98.84.28.135/services.html
        run: |
          npm ci --legacy-peer-deps
          npm run build
      - name: Upload dist artifact
        uses: actions/upload-artifact@v4
        with:
          name: farmersmk-web-dist
          path: farmersmk-frontend-web/dist/
          retention-days: 3

  deploy-ec2:
    # Runs independently — not blocked by Java build-test failures
    needs: frontend-web
    if: github.ref == 'refs/heads/master'
    runs-on: ubuntu-latest
    timeout-minutes: 20
    env:
      EC2_HOST: 98.84.28.135
    steps:
      - name: Load SSH key into agent
        uses: webfactory/ssh-agent@v0.9.0
        with:
          ssh-private-key: ${{ secrets.EC2_SSH_KEY }}

      - name: Add EC2 to known hosts
        run: ssh-keyscan -H "$EC2_HOST" >> ~/.ssh/known_hosts

      - name: Deploy to EC2
        run: |
          ssh -o StrictHostKeyChecking=no ubuntu@$EC2_HOST << 'ENDSSH'
            set -e

            # Install git if missing
            command -v git >/dev/null 2>&1 || (sudo apt-get update -qq && sudo apt-get install -y -qq git)

            # Clone or update repo
            if [ -d /opt/farmersmk/.git ]; then
              cd /opt/farmersmk
              sudo git fetch origin master
              sudo git reset --hard origin/master
            else
              sudo mkdir -p /opt/farmersmk
              sudo git clone https://github.com/regobertatangangwatangie-eng/farmersmk.com.git /opt/farmersmk
              cd /opt/farmersmk
            fi

            sudo chown -R ubuntu:ubuntu /opt/farmersmk

            # Install docker compose plugin if missing
            docker compose version >/dev/null 2>&1 || (sudo apt-get update -qq && sudo apt-get install -y -qq docker-compose-plugin)

            export VITE_API_BASE_URL=http://98.84.28.135:8080
            export VITE_REALTIME_URL=ws://98.84.28.135:8080/ws
            export VITE_SERVICE_HUB_URL=http://98.84.28.135/services.html
            sudo -E docker compose -f docker-compose.local.yml up --build -d --remove-orphans
            echo "=== Running containers ==="
            sudo docker ps --format 'table {{.Names}}\t{{.Status}}\t{{.Ports}}'
          ENDSSH

  build-android:
    # Independent of Java services — Android build must not be blocked by backend failures
    if: github.ref == 'refs/heads/master'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: npm
          cache-dependency-path: farmersmk-android-app/package-lock.json
      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'
      - name: Force Gradle to use Java 17 (prevents AGP toolchain picking system Java 21)
        run: |
          mkdir -p ~/.gradle
          # Write global gradle.properties so ALL Gradle invocations use Java 17
          echo "org.gradle.java.home=$JAVA_HOME_17_X64" > ~/.gradle/gradle.properties
          # Clear stale Gradle transform caches that may reference Java 21 paths
          rm -rf ~/.gradle/caches/transforms-3 2>/dev/null || true
          echo "Active Java: $(java -version 2>&1 | head -1)"
          echo "JAVA_HOME_17_X64=$JAVA_HOME_17_X64"
      - name: Install dependencies
        working-directory: farmersmk-android-app
        run: npm ci --legacy-peer-deps
      - name: Install EAS CLI
        run: npm install -g eas-cli@latest
      - name: Build Android APK locally (no Expo build credits)
        working-directory: farmersmk-android-app
        env:
          EXPO_TOKEN: ${{ secrets.EXPO_TOKEN }}
          EXPO_PUBLIC_API_BASE_URL: http://98.84.28.135:8080
          JAVA_HOME: ${{ env.JAVA_HOME_17_X64 }}
        run: eas build --platform android --profile preview --non-interactive --local --output ./build/farmersmk-preview.apk
      - name: Upload APK artifact
        uses: actions/upload-artifact@v4
        with:
          name: farmersmk-android-apk
          path: farmersmk-android-app/build/farmersmk-preview.apk
          retention-days: 14

