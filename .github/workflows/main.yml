name: FarmersMK CI/CD

# Prevent concurrent deploys on same branch (queue; don't cancel in-progress)
concurrency:
  group: farmersmk-${{ github.ref }}
  cancel-in-progress: false

on:
  push:
    branches: [master, main]
  pull_request:
    branches: [master, main]

# ── Shared Maven mirror settings written once and reused via cache ───────────
env:
  MAVEN_OPTS: >-
    -Dmaven.wagon.http.retryHandler.count=3
    -Dmaven.wagon.http.pool=false

jobs:
  # ── 1. Discover Java microservices ──────────────────────────────────────────
  discover:
    runs-on: ubuntu-latest
    outputs:
      services: ${{ steps.set.outputs.services }}
    steps:
      - uses: actions/checkout@v4
      - id: set
        shell: bash
        run: |
          services=$(find services -mindepth 1 -maxdepth 1 -type d -name 'farmersmk-*' \
            -exec test -f '{}/pom.xml' ';' -print \
            | xargs -r -n1 basename | sort \
            | jq -R -s -c 'split("\n")[:-1]')
          echo "services=${services}" >> "$GITHUB_OUTPUT"

  # ── 2. Build & test Java services (matrix, every branch) ────────────────────
  build-test:
    needs: discover
    if: ${{ needs.discover.outputs.services != '[]' }}
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        service: ${{ fromJson(needs.discover.outputs.services) }}
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '21'
          cache: maven
      - name: Configure Maven mirror
        run: |
          mkdir -p ~/.m2
          cat > ~/.m2/settings.xml << 'SETTINGS_EOF'
          <settings xmlns="http://maven.apache.org/SETTINGS/1.0.0"
                    xmlns:xsi="http://www.w3.org/2001/XMLSchema-instance"
                    xsi:schemaLocation="http://maven.apache.org/SETTINGS/1.0.0 https://maven.apache.org/xsd/settings-1.0.0.xsd">
            <mirrors>
              <mirror>
                <id>central-repo1</id>
                <name>Maven Central via repo1</name>
                <url>https://repo1.maven.org/maven2</url>
                <mirrorOf>central</mirrorOf>
              </mirror>
            </mirrors>
          </settings>
          SETTINGS_EOF
      - name: Build and test
        working-directory: services/${{ matrix.service }}
        run: mvn -B -ntp clean test

  # ── 3. Build/validate web frontend ──────────────────────────────────────────
  frontend-web:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20.19.4'
          cache: npm
          cache-dependency-path: farmersmk-frontend-web/package-lock.json
      - name: Build web frontend
        working-directory: farmersmk-frontend-web
        env:
          VITE_API_BASE_URL: ${{ vars.VITE_API_BASE_URL || 'https://api.example.com' }}
          VITE_REALTIME_URL: ${{ vars.VITE_REALTIME_URL || 'wss://api.example.com/ws' }}
          VITE_SERVICE_HUB_URL: ${{ vars.VITE_SERVICE_HUB_URL || 'https://api.example.com/services.html' }}
        run: |
          npm ci --legacy-peer-deps
          npm run build
      - name: Upload dist artifact
        uses: actions/upload-artifact@v4
        with:
          name: farmersmk-web-dist
          path: farmersmk-frontend-web/dist/
          retention-days: 3

  # ── 4. Build Android APK (master only, requires EXPO_TOKEN secret) ──────────
  build-android:
    if: github.ref == 'refs/heads/master' || github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: npm
          cache-dependency-path: farmersmk-android-app/package-lock.json
      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'
      - name: Force Gradle to use Java 17
        run: |
          mkdir -p ~/.gradle
          echo "org.gradle.java.home=$JAVA_HOME_17_X64" > ~/.gradle/gradle.properties
          rm -rf ~/.gradle/caches/transforms-3 2>/dev/null || true
      - name: Install dependencies
        working-directory: farmersmk-android-app
        run: npm ci --legacy-peer-deps
      - name: Install EAS CLI
        run: npm install -g eas-cli@latest
      - name: Check EXPO_TOKEN
        id: expo-check
        env:
          EXPO_TOKEN: ${{ secrets.EXPO_TOKEN }}
        run: |
          if [ -z "$EXPO_TOKEN" ]; then
            echo "EXPO_TOKEN secret not set — skipping Android build"
            echo "skip=true" >> "$GITHUB_OUTPUT"
          elif ! eas whoami 2>/dev/null; then
            echo "EXPO_TOKEN is set but invalid or expired — skipping Android build"
            echo "skip=true" >> "$GITHUB_OUTPUT"
          else
            echo "skip=false" >> "$GITHUB_OUTPUT"
          fi
      - name: Build Android APK locally
        if: steps.expo-check.outputs.skip == 'false'
        working-directory: farmersmk-android-app
        env:
          EXPO_TOKEN: ${{ secrets.EXPO_TOKEN }}
          EXPO_PUBLIC_API_BASE_URL: ${{ vars.VITE_API_BASE_URL || 'https://api.example.com' }}
          JAVA_HOME: ${{ env.JAVA_HOME_17_X64 }}
        run: eas build --platform android --profile preview --non-interactive --local --output ./build/farmersmk-preview.apk
      - name: Upload APK artifact
        if: steps.expo-check.outputs.skip == 'false'
        uses: actions/upload-artifact@v4
        with:
          name: farmersmk-android-apk
          path: farmersmk-android-app/build/farmersmk-preview.apk
          retention-days: 14

  # ── 5. Docker build & push — Java microservices (master only) ───────────────
  # All Dockerfiles are multi-stage (build from source inside Docker).
  # No pre-build step needed — docker build handles compilation.
  docker-services:
    name: Docker (${{ matrix.service }})
    needs: [discover, build-test]
    if: >-
      (github.ref == 'refs/heads/master' || github.ref == 'refs/heads/main') &&
      needs.discover.outputs.services != '[]'
    runs-on: ubuntu-latest
    continue-on-error: true   # non-fatal: requires DOCKERHUB_USERNAME / DOCKERHUB_TOKEN secrets
    strategy:
      fail-fast: false
      matrix:
        service: ${{ fromJson(needs.discover.outputs.services) }}
    steps:
      - uses: actions/checkout@v4
      - uses: docker/setup-buildx-action@v3
      - name: Check Docker Hub credentials
        id: docker-check
        env:
          DOCKERHUB_USERNAME: ${{ secrets.DOCKERHUB_USERNAME }}
          DOCKERHUB_TOKEN: ${{ secrets.DOCKERHUB_TOKEN }}
        run: |
          if [ -z "$DOCKERHUB_USERNAME" ] || [ -z "$DOCKERHUB_TOKEN" ]; then
            echo "DOCKERHUB_USERNAME or DOCKERHUB_TOKEN not set — skipping"
            echo "skip=true" >> "$GITHUB_OUTPUT"
          else
            echo "skip=false" >> "$GITHUB_OUTPUT"
          fi
      - uses: docker/login-action@v3
        if: steps.docker-check.outputs.skip == 'false'
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}
      - name: Build and push
        if: steps.docker-check.outputs.skip == 'false'
        working-directory: services/${{ matrix.service }}
        env:
          IMAGE: ${{ secrets.DOCKERHUB_USERNAME }}/${{ matrix.service }}
          SHA_TAG: ${{ github.sha }}
        run: |
          # Docker Hub requires lowercase image names
          IMAGE_LC="${IMAGE,,}"
          # Handle both 'Dockerfile' (most services) and 'dockerfile' (mtnmobilemoney)
          DF=$([ -f Dockerfile ] && echo Dockerfile || ([ -f dockerfile ] && echo dockerfile || echo ""))
          if [ -z "$DF" ]; then
            echo "No Dockerfile in ${{ matrix.service }}, skipping"
            exit 0
          fi
          docker build -f "$DF" \
            -t "${IMAGE_LC}:latest" \
            -t "${IMAGE_LC}:${SHA_TAG::8}" \
            .
          docker push "${IMAGE_LC}:latest"
          docker push "${IMAGE_LC}:${SHA_TAG::8}"

  # ── 6. Docker build & push — web frontend (master only) ─────────────────────
  docker-frontend:
    name: Docker (frontend-web)
    needs: [frontend-web]
    if: github.ref == 'refs/heads/master' || github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest
    continue-on-error: true   # non-fatal: requires DOCKERHUB_USERNAME / DOCKERHUB_TOKEN secrets
    steps:
      - uses: actions/checkout@v4
      - uses: docker/setup-buildx-action@v3
      - name: Check Docker Hub credentials
        id: docker-check
        env:
          DOCKERHUB_USERNAME: ${{ secrets.DOCKERHUB_USERNAME }}
          DOCKERHUB_TOKEN: ${{ secrets.DOCKERHUB_TOKEN }}
        run: |
          if [ -z "$DOCKERHUB_USERNAME" ] || [ -z "$DOCKERHUB_TOKEN" ]; then
            echo "DOCKERHUB_USERNAME or DOCKERHUB_TOKEN not set — skipping"
            echo "skip=true" >> "$GITHUB_OUTPUT"
          else
            echo "skip=false" >> "$GITHUB_OUTPUT"
          fi
      - uses: docker/login-action@v3
        if: steps.docker-check.outputs.skip == 'false'
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}
      - name: Build and push frontend image
        if: steps.docker-check.outputs.skip == 'false'
        env:
          IMAGE: ${{ secrets.DOCKERHUB_USERNAME }}/farmersmk-frontend-web
          SHA_TAG: ${{ github.sha }}
          VITE_API_BASE_URL: ${{ vars.VITE_API_BASE_URL || 'https://api.example.com' }}
          VITE_REALTIME_URL: ${{ vars.VITE_REALTIME_URL || 'wss://api.example.com/ws' }}
        run: |
          docker build \
            --build-arg VITE_API_BASE_URL="${VITE_API_BASE_URL}" \
            --build-arg VITE_REALTIME_URL="${VITE_REALTIME_URL}" \
            -t "${IMAGE}:latest" \
            -t "${IMAGE}:${SHA_TAG::8}" \
            farmersmk-frontend-web/
          docker push "${IMAGE}:latest"
          docker push "${IMAGE}:${SHA_TAG::8}"

  # ── 7. Deploy to Kubernetes / k3s ───────────────────────────────────────────
  # Secret K8S_KUBECONFIG: base64-encoded kubeconfig.
  # Get it: ssh ec2-user@100.48.216.40 \
  #   "sudo cat /etc/rancher/k3s/k3s.yaml | sed 's/127.0.0.1/100.48.216.40/g'" | base64
  deploy-k8s:
    name: Deploy to k3s
    needs: [docker-services, docker-frontend]
    if: github.ref == 'refs/heads/master' || github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest
    continue-on-error: true   # non-fatal: requires K8S_KUBECONFIG secret
    environment: production
    steps:
      - uses: actions/checkout@v4
      - name: Check K8S_KUBECONFIG secret
        id: k8s-check
        env:
          K8S_KUBECONFIG: ${{ secrets.K8S_KUBECONFIG }}
        run: |
          if [ -z "$K8S_KUBECONFIG" ]; then
            echo "K8S_KUBECONFIG not set — skipping k3s deploy"
            echo "skip=true" >> "$GITHUB_OUTPUT"
          else
            echo "skip=false" >> "$GITHUB_OUTPUT"
          fi
      - name: Install kubectl
        if: steps.k8s-check.outputs.skip == 'false'
        uses: azure/setup-kubectl@v3
        with:
          version: "v1.29.0"
      - name: Configure kubeconfig
        if: steps.k8s-check.outputs.skip == 'false'
        env:
          K8S_KUBECONFIG: ${{ secrets.K8S_KUBECONFIG }}
        run: |
          mkdir -p ~/.kube
          printf '%s' "$K8S_KUBECONFIG" | base64 -d > ~/.kube/config
          chmod 600 ~/.kube/config
      - name: Install nginx-ingress controller (idempotent)
        if: steps.k8s-check.outputs.skip == 'false'
        run: |
          kubectl apply -f https://raw.githubusercontent.com/kubernetes/ingress-nginx/controller-v1.10.1/deploy/static/provider/baremetal/deploy.yaml || true
          kubectl wait --namespace ingress-nginx \
            --for=condition=ready pod \
            --selector=app.kubernetes.io/component=controller \
            --timeout=120s || true
      - name: Apply farmersMK manifests
        if: steps.k8s-check.outputs.skip == 'false'
        run: |
          # Wait for k3s API to be ready (up to 60s)
          for i in $(seq 1 12); do
            kubectl cluster-info --request-timeout=5s 2>/dev/null && break
            echo "Waiting for k3s API... attempt $i/12"
            sleep 5
          done
          kubectl apply -k kubernetes/ --validate=false
      - name: Rollout restart all deployments
        if: steps.k8s-check.outputs.skip == 'false'
        run: kubectl rollout restart deployment -n farmersmk
      - name: Wait for rollout
        if: steps.k8s-check.outputs.skip == 'false'
        run: kubectl rollout status deployment -n farmersmk --timeout=180s || true

  # ── 8. Deploy via Ansible + Docker Compose (EC2 app servers) ────────────────
  # Secrets: ANSIBLE_SSH_KEY, ANSIBLE_HOST_1 (e.g. 98.92.240.160), ANSIBLE_HOST_2 (e.g. 3.222.188.212)
  deploy-compose:
    name: Deploy via Ansible (EC2)
    needs: [docker-services, docker-frontend]
    if: github.ref == 'refs/heads/master' || github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest
    continue-on-error: true   # non-fatal: requires ANSIBLE_SSH_KEY / ANSIBLE_HOST_* secrets
    environment: production
    steps:
      - uses: actions/checkout@v4
      - name: Check Ansible secrets
        id: ansible-check
        env:
          ANSIBLE_SSH_KEY: ${{ secrets.ANSIBLE_SSH_KEY }}
          ANSIBLE_HOST_1: ${{ secrets.ANSIBLE_HOST_1 }}
        run: |
          if [ -z "$ANSIBLE_SSH_KEY" ] || [ -z "$ANSIBLE_HOST_1" ]; then
            echo "ANSIBLE_SSH_KEY or ANSIBLE_HOST_1 not set — skipping Ansible deploy"
            echo "skip=true" >> "$GITHUB_OUTPUT"
          else
            echo "skip=false" >> "$GITHUB_OUTPUT"
          fi
      - name: Install Ansible
        if: steps.ansible-check.outputs.skip == 'false'
        run: |
          python3 -m pip install --upgrade pip
          pip install ansible boto3
      - name: Write SSH key
        if: steps.ansible-check.outputs.skip == 'false'
        env:
          ANSIBLE_SSH_KEY: ${{ secrets.ANSIBLE_SSH_KEY }}
        run: |
          mkdir -p ~/.ssh
          echo "$ANSIBLE_SSH_KEY" | base64 -d > ~/.ssh/farmersmk.pem
          chmod 600 ~/.ssh/farmersmk.pem
          ssh-keygen -l -f ~/.ssh/farmersmk.pem
      - name: Write dynamic inventory
        if: steps.ansible-check.outputs.skip == 'false'
        run: |
          mkdir -p infrastructure/ansible
          printf '[FarmersMK]\n' > infrastructure/ansible/inventory.ci.ini
          printf 'server1 ansible_host=${{ secrets.ANSIBLE_HOST_1 }} ansible_user=ec2-user ansible_ssh_private_key_file=~/.ssh/farmersmk.pem\n' >> infrastructure/ansible/inventory.ci.ini
          printf 'server2 ansible_host=${{ secrets.ANSIBLE_HOST_2 }} ansible_user=ec2-user ansible_ssh_private_key_file=~/.ssh/farmersmk.pem\n' >> infrastructure/ansible/inventory.ci.ini
      - name: Wait for Ansible hosts SSH ready
        if: steps.ansible-check.outputs.skip == 'false'
        run: |
          for host in "${{ secrets.ANSIBLE_HOST_1 }}" "${{ secrets.ANSIBLE_HOST_2 }}"; do
            echo "Waiting for SSH on $host..."
            for i in $(seq 1 20); do
              ssh -i ~/.ssh/farmersmk.pem -o StrictHostKeyChecking=no -o ConnectTimeout=10 \
                -o BatchMode=yes ec2-user@$host "echo ok" 2>/dev/null && echo "$host ready" && break
              echo "  attempt $i/20 — retrying in 15s"
              sleep 15
            done
          done
      - name: Run Ansible playbook
        if: steps.ansible-check.outputs.skip == 'false'
        run: |
          cd infrastructure/ansible
          ansible-playbook -i inventory.ci.ini site.yml \
            --extra-vars "docker_username=${{ secrets.DOCKERHUB_USERNAME }} docker_password=${{ secrets.DOCKERHUB_TOKEN }}" \
            --ssh-extra-args="-o StrictHostKeyChecking=no -o ConnectTimeout=30 -o ServerAliveInterval=60"
