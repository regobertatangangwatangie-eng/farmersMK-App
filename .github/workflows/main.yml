name: FarmPro Monorepo CI/CD

on:
  push:
    branches: [master, main]
  pull_request:
    branches: [master, main]

jobs:
  discover:
    runs-on: ubuntu-latest
    outputs:
      services: ${{ steps.set.outputs.services }}
    steps:
      - uses: actions/checkout@v4
      - id: set
        shell: bash
        run: |
          services=$(find services -mindepth 1 -maxdepth 1 -type d -name 'farmpro-*' -exec test -f '{}/pom.xml' ';' -print | xargs -r -n1 basename | sort | jq -R -s -c 'split("\n")[:-1]')
          echo "services=${services}" >> "$GITHUB_OUTPUT"

  build-test:
    needs: discover
    if: ${{ needs.discover.outputs.services != '[]' }}
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        service: ${{ fromJson(needs.discover.outputs.services) }}
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '21'
      - name: Build and test
        working-directory: services/${{ matrix.service }}
        run: |
          if [ -f pom.xml ]; then
            mvn -B -ntp clean test
          else
            echo "No pom.xml for ${{ matrix.service }}, skipping"
          fi

  docker:
    needs: [discover, build-test]
    if: github.ref == 'refs/heads/master' && needs.discover.outputs.services != '[]'
    runs-on: ubuntu-latest
    env:
      DOCKER_REGISTRY_USER: ${{ secrets.DOCKERHUB_USERNAME || secrets.DOCKER_USERNAME }}
      DOCKER_REGISTRY_TOKEN: ${{ secrets.DOCKERHUB_TOKEN || secrets.DOCKER_PASSWORD }}
    strategy:
      fail-fast: false
      matrix:
        service: ${{ fromJson(needs.discover.outputs.services) }}
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '21'
      - uses: docker/setup-buildx-action@v3
      - id: docker-login
        continue-on-error: true
        if: env.DOCKER_REGISTRY_USER != '' && env.DOCKER_REGISTRY_TOKEN != ''
        uses: docker/login-action@v3
        with:
          username: ${{ env.DOCKER_REGISTRY_USER }}
          password: ${{ env.DOCKER_REGISTRY_TOKEN }}

      - name: Package service for Docker context
        working-directory: services/${{ matrix.service }}
        run: |
          if [ -f pom.xml ]; then
            mvn -B -ntp -DskipTests package
          else
            echo "No pom.xml for ${{ matrix.service }}, skipping package"
          fi

      - name: Build image
        working-directory: services/${{ matrix.service }}
        run: |
          svc_lower=$(echo "${{ matrix.service }}" | tr '[:upper:]' '[:lower:]')
          dockerfile=""
          if [ -f Dockerfile ]; then
            dockerfile="Dockerfile"
          elif [ -f dockerfile ]; then
            dockerfile="dockerfile"
          fi

          if [ -n "$dockerfile" ]; then
            docker build -f "$dockerfile" -t farmpro-local/${svc_lower}:latest .
          else
            echo "No Dockerfile/dockerfile for ${{ matrix.service }}, skipping"
          fi

      - name: Retag image for Docker Hub
        if: steps.docker-login.outcome == 'success'
        working-directory: services/${{ matrix.service }}
        run: |
          svc_lower=$(echo "${{ matrix.service }}" | tr '[:upper:]' '[:lower:]')
          docker tag farmpro-local/${svc_lower}:latest ${{ env.DOCKER_REGISTRY_USER }}/${svc_lower}:latest

      - name: Push image
        if: steps.docker-login.outcome == 'success'
        run: |
          svc_lower=$(echo "${{ matrix.service }}" | tr '[:upper:]' '[:lower:]')
          docker push ${{ env.DOCKER_REGISTRY_USER }}/${svc_lower}:latest

      - name: Skip push notice
        if: steps.docker-login.outcome != 'success'
        run: |
          echo "Docker login was not successful (missing or invalid secrets)."
          echo "Build completed; image push skipped for ${{ matrix.service }}."

  frontend-web:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: npm
          cache-dependency-path: farmpro-frontend-web/package-lock.json
      - name: Build web frontend
        working-directory: farmpro-frontend-web
        env:
          VITE_API_BASE_URL: http://98.92.83.116:8080
          VITE_REALTIME_URL: ws://98.92.83.116:8080/ws
          VITE_SERVICE_HUB_URL: http://98.92.83.116/services.html
        run: |
          npm ci --legacy-peer-deps
          npm run build
      - name: Upload dist artifact
        uses: actions/upload-artifact@v4
        with:
          name: farmpro-web-dist
          path: farmpro-frontend-web/dist/
          retention-days: 3

  deploy-ec2:
    needs: [build-test, frontend-web]
    if: github.ref == 'refs/heads/master'
    runs-on: ubuntu-latest
    steps:
      - name: Deploy stack to EC2 via SSH
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: 98.92.83.116
          username: ubuntu
          key: ${{ secrets.EC2_SSH_KEY }}
          port: 22
          command_timeout: 30m
          script: |
            set -e
            cd /opt/farmerpro

            # Pull latest code
            sudo git fetch origin master
            sudo git reset --hard origin/master

            # Fix ownership after git reset
            sudo chown -R ubuntu:ubuntu /opt/farmerpro

            # Set API URL build arg and start the stack
            export VITE_API_BASE_URL=http://98.92.83.116:8080
            export VITE_REALTIME_URL=ws://98.92.83.116:8080/ws
            export VITE_SERVICE_HUB_URL=http://98.92.83.116/services.html

            sudo -E docker compose -f docker-compose.local.yml up --build -d --remove-orphans
            echo "=== Running containers ==="
            sudo docker ps --format 'table {{.Names}}\t{{.Status}}\t{{.Ports}}'

  build-android:
    needs: build-test
    if: github.ref == 'refs/heads/master'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: npm
          cache-dependency-path: farmpro-android-app/package-lock.json
      - name: Install dependencies
        working-directory: farmpro-android-app
        run: npm ci --legacy-peer-deps
      - name: Install EAS CLI
        run: npm install -g eas-cli@latest
      - name: Build Android preview APK
        working-directory: farmpro-android-app
        env:
          EXPO_TOKEN: ${{ secrets.EXPO_TOKEN }}
          EXPO_PUBLIC_API_BASE_URL: http://98.92.83.116:8080
        run: eas build --platform android --profile preview --non-interactive

