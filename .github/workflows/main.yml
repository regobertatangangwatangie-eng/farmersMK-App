name: FarmersMK CI/CD

# Prevent concurrent deploys on same branch (queue; don't cancel in-progress)
concurrency:
  group: farmersmk-${{ github.ref }}
  cancel-in-progress: false

on:
  push:
    branches: [master, main]
  pull_request:
    branches: [master, main]

# ── Shared Maven mirror settings written once and reused via cache ───────────
env:
  MAVEN_OPTS: >-
    -Dmaven.wagon.http.retryHandler.count=3
    -Dmaven.wagon.http.pool=false

jobs:
  # ── 1. Discover Java microservices ──────────────────────────────────────────
  discover:
    runs-on: ubuntu-latest
    outputs:
      services: ${{ steps.set.outputs.services }}
    steps:
      - uses: actions/checkout@v4
      - id: set
        shell: bash
        run: |
          services=$(find services -mindepth 1 -maxdepth 1 -type d -name 'farmersmk-*' \
            -exec test -f '{}/pom.xml' ';' -print \
            | xargs -r -n1 basename | sort \
            | jq -R -s -c 'split("\n")[:-1]')
          echo "services=${services}" >> "$GITHUB_OUTPUT"

  # ── 2. Build & test Java services (matrix, every branch) ────────────────────
  build-test:
    needs: discover
    if: ${{ needs.discover.outputs.services != '[]' }}
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        service: ${{ fromJson(needs.discover.outputs.services) }}
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '21'
          cache: maven
      - name: Configure Maven mirror
        run: |
          mkdir -p ~/.m2
          cat > ~/.m2/settings.xml << 'SETTINGS_EOF'
          <settings xmlns="http://maven.apache.org/SETTINGS/1.0.0"
                    xmlns:xsi="http://www.w3.org/2001/XMLSchema-instance"
                    xsi:schemaLocation="http://maven.apache.org/SETTINGS/1.0.0 https://maven.apache.org/xsd/settings-1.0.0.xsd">
            <mirrors>
              <mirror>
                <id>central-repo1</id>
                <name>Maven Central via repo1</name>
                <url>https://repo1.maven.org/maven2</url>
                <mirrorOf>central</mirrorOf>
              </mirror>
            </mirrors>
          </settings>
          SETTINGS_EOF
      - name: Build and test
        working-directory: services/${{ matrix.service }}
        run: mvn -B -ntp clean test

  # ── 3. Build/validate web frontend ──────────────────────────────────────────
  frontend-web:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20.19.4'
          cache: npm
          cache-dependency-path: farmersmk-frontend-web/package-lock.json
      - name: Build web frontend
        working-directory: farmersmk-frontend-web
        env:
          VITE_API_BASE_URL: ${{ vars.VITE_API_BASE_URL || 'https://api.farmersmk-app.com' }}
          VITE_REALTIME_URL: ${{ vars.VITE_REALTIME_URL || 'wss://api.farmersmk-app.com/ws' }}
          VITE_SERVICE_HUB_URL: ${{ vars.VITE_SERVICE_HUB_URL || 'https://api.farmersmk-app.com/services.html' }}
        run: |
          npm ci --legacy-peer-deps
          npm run build
      - name: Upload dist artifact
        uses: actions/upload-artifact@v4
        with:
          name: farmersmk-web-dist
          path: farmersmk-frontend-web/dist/
          retention-days: 3

  # ── 4. Build Android APK (master only, requires EXPO_TOKEN secret) ──────────
  build-android:
    if: github.ref == 'refs/heads/master' || github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: npm
          cache-dependency-path: farmersmk-android-app/package-lock.json
      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'
      - name: Force Gradle to use Java 17
        run: |
          mkdir -p ~/.gradle
          echo "org.gradle.java.home=$JAVA_HOME_17_X64" > ~/.gradle/gradle.properties
          rm -rf ~/.gradle/caches/transforms-3 2>/dev/null || true
      - name: Install dependencies
        working-directory: farmersmk-android-app
        run: npm ci --legacy-peer-deps
      - name: Install EAS CLI
        run: npm install -g eas-cli@latest
      - name: Check EXPO_TOKEN
        id: expo-check
        env:
          EXPO_TOKEN: ${{ secrets.EXPO_TOKEN }}
        run: |
          if [ -z "$EXPO_TOKEN" ]; then
            echo "EXPO_TOKEN secret not set — skipping Android build"
            echo "skip=true" >> "$GITHUB_OUTPUT"
          elif ! eas whoami 2>/dev/null; then
            echo "EXPO_TOKEN is set but invalid or expired — skipping Android build"
            echo "skip=true" >> "$GITHUB_OUTPUT"
          else
            echo "skip=false" >> "$GITHUB_OUTPUT"
          fi
      - name: Build Android APK locally
        if: steps.expo-check.outputs.skip == 'false'
        working-directory: farmersmk-android-app
        env:
          EXPO_TOKEN: ${{ secrets.EXPO_TOKEN }}
          EXPO_PUBLIC_API_BASE_URL: ${{ vars.VITE_API_BASE_URL || 'https://api.farmersmk-app.com' }}
          JAVA_HOME: ${{ env.JAVA_HOME_17_X64 }}
        run: eas build --platform android --profile preview --non-interactive --local --output ./build/farmersmk-preview.apk
      - name: Upload APK artifact
        if: steps.expo-check.outputs.skip == 'false'
        uses: actions/upload-artifact@v4
        with:
          name: farmersmk-android-apk
          path: farmersmk-android-app/build/farmersmk-preview.apk
          retention-days: 14

  # ── 5. Docker build & push — Java microservices (master only) ───────────────
  # All Dockerfiles are multi-stage (build from source inside Docker).
  # No pre-build step needed — docker build handles compilation.
  docker-services:
    name: Docker (${{ matrix.service }})
    needs: [discover, build-test]
    if: >-
      (github.ref == 'refs/heads/master' || github.ref == 'refs/heads/main') &&
      needs.discover.outputs.services != '[]'
    runs-on: ubuntu-latest
    continue-on-error: true   # non-fatal: requires DOCKERHUB_USERNAME / DOCKERHUB_TOKEN secrets
    strategy:
      fail-fast: false
      matrix:
        service: ${{ fromJson(needs.discover.outputs.services) }}
    steps:
      - uses: actions/checkout@v4
      - uses: docker/setup-buildx-action@v3
      - name: Check Docker Hub credentials
        id: docker-check
        env:
          DOCKERHUB_USERNAME: ${{ secrets.DOCKERHUB_USERNAME }}
          DOCKERHUB_TOKEN: ${{ secrets.DOCKERHUB_TOKEN }}
        run: |
          if [ -z "$DOCKERHUB_USERNAME" ] || [ -z "$DOCKERHUB_TOKEN" ]; then
            echo "DOCKERHUB_USERNAME or DOCKERHUB_TOKEN not set — skipping"
            echo "skip=true" >> "$GITHUB_OUTPUT"
          else
            echo "skip=false" >> "$GITHUB_OUTPUT"
          fi
      - uses: docker/login-action@v3
        if: steps.docker-check.outputs.skip == 'false'
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}
      - name: Build and push
        if: steps.docker-check.outputs.skip == 'false'
        working-directory: services/${{ matrix.service }}
        env:
          IMAGE: ${{ secrets.DOCKERHUB_USERNAME }}/${{ matrix.service }}
          SHA_TAG: ${{ github.sha }}
        run: |
          # Docker Hub requires lowercase image names
          IMAGE_LC="${IMAGE,,}"
          # Handle both 'Dockerfile' (most services) and 'dockerfile' (mtnmobilemoney)
          DF=$([ -f Dockerfile ] && echo Dockerfile || ([ -f dockerfile ] && echo dockerfile || echo ""))
          if [ -z "$DF" ]; then
            echo "No Dockerfile in ${{ matrix.service }}, skipping"
            exit 0
          fi
          docker build -f "$DF" \
            -t "${IMAGE_LC}:latest" \
            -t "${IMAGE_LC}:${SHA_TAG::8}" \
            .
          docker push "${IMAGE_LC}:latest"
          docker push "${IMAGE_LC}:${SHA_TAG::8}"

  # ── 6. Docker build & push — web frontend (master only) ─────────────────────
  docker-frontend:
    name: Docker (frontend-web)
    needs: [frontend-web]
    if: github.ref == 'refs/heads/master' || github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest
    continue-on-error: true   # non-fatal: requires DOCKERHUB_USERNAME / DOCKERHUB_TOKEN secrets
    steps:
      - uses: actions/checkout@v4
      - uses: docker/setup-buildx-action@v3
      - name: Check Docker Hub credentials
        id: docker-check
        env:
          DOCKERHUB_USERNAME: ${{ secrets.DOCKERHUB_USERNAME }}
          DOCKERHUB_TOKEN: ${{ secrets.DOCKERHUB_TOKEN }}
        run: |
          if [ -z "$DOCKERHUB_USERNAME" ] || [ -z "$DOCKERHUB_TOKEN" ]; then
            echo "DOCKERHUB_USERNAME or DOCKERHUB_TOKEN not set — skipping"
            echo "skip=true" >> "$GITHUB_OUTPUT"
          else
            echo "skip=false" >> "$GITHUB_OUTPUT"
          fi
      - uses: docker/login-action@v3
        if: steps.docker-check.outputs.skip == 'false'
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}
      - name: Build and push frontend image
        if: steps.docker-check.outputs.skip == 'false'
        env:
          IMAGE: ${{ secrets.DOCKERHUB_USERNAME }}/farmersmk-frontend-web
          SHA_TAG: ${{ github.sha }}
          VITE_API_BASE_URL: ${{ vars.VITE_API_BASE_URL || 'https://api.farmersmk-app.com' }}
          VITE_REALTIME_URL: ${{ vars.VITE_REALTIME_URL || 'wss://api.farmersmk-app.com/ws' }}
        run: |
          docker build \
            --build-arg VITE_API_BASE_URL="${VITE_API_BASE_URL}" \
            --build-arg VITE_REALTIME_URL="${VITE_REALTIME_URL}" \
            -t "${IMAGE}:latest" \
            -t "${IMAGE}:${SHA_TAG::8}" \
            farmersmk-frontend-web/
          docker push "${IMAGE}:latest"
          docker push "${IMAGE}:${SHA_TAG::8}"

  # ── 7. Deploy to Kubernetes / k3s ───────────────────────────────────────────
  deploy-k8s:
    name: Deploy to k3s
    needs: [docker-services, docker-frontend]
    if: github.ref == 'refs/heads/master' || github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest
    continue-on-error: true
    environment: production
    env:
      K8S_INSTANCE_ID: i-041bb29742ae94c68
      K8S_SERVER_IP: 52.55.233.119
      AWS_ACCESS_KEY_ID: ${{ secrets.AWS_ACCESS_KEY_ID }}
      AWS_SECRET_ACCESS_KEY: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
      AWS_DEFAULT_REGION: us-east-1
    steps:
      - uses: actions/checkout@v4
      - name: Check K8S deploy secrets
        id: k8s-check
        env:
          K8S_KUBECONFIG: ${{ secrets.K8S_KUBECONFIG }}
          ANSIBLE_SSH_KEY: ${{ secrets.ANSIBLE_SSH_KEY }}
        run: |
          if [ -z "$ANSIBLE_SSH_KEY" ] && [ -z "$K8S_KUBECONFIG" ]; then
            echo "Neither ANSIBLE_SSH_KEY nor K8S_KUBECONFIG set — skipping k3s deploy"
            echo "skip=true" >> "$GITHUB_OUTPUT"
          else
            echo "skip=false" >> "$GITHUB_OUTPUT"
          fi
      - name: Install kubectl + awscli
        if: steps.k8s-check.outputs.skip == 'false'
        run: |
          # kubectl
          curl -sLO "https://dl.k8s.io/release/v1.29.0/bin/linux/amd64/kubectl"
          chmod +x kubectl && sudo mv kubectl /usr/local/bin/
          # awscli
          pip install awscli --quiet
      - name: Configure kubeconfig (fetch fresh from k3s via SSH)
        if: steps.k8s-check.outputs.skip == 'false'
        env:
          K8S_KUBECONFIG: ${{ secrets.K8S_KUBECONFIG }}
          ANSIBLE_SSH_KEY: ${{ secrets.ANSIBLE_SSH_KEY }}
        run: |
          mkdir -p ~/.kube ~/.ssh
          # Write SSH key
          echo "$ANSIBLE_SSH_KEY" | base64 -d > ~/.ssh/farmersmk.pem
          chmod 600 ~/.ssh/farmersmk.pem

          # Fix k3s TLS SAN so the cert covers the current Elastic IP
          echo "=== Fixing k3s TLS SAN on $K8S_SERVER_IP ==="
          ssh -i ~/.ssh/farmersmk.pem \
            -o StrictHostKeyChecking=no \
            -o ConnectTimeout=30 \
            ec2-user@"$K8S_SERVER_IP" \
            "sudo bash -c 'mkdir -p /etc/rancher/k3s && printf \"tls-san:\\n  - $K8S_SERVER_IP\\n  - ec2-52-55-233-119.compute-1.amazonaws.com\\n  - localhost\\n  - 127.0.0.1\\n\" > /etc/rancher/k3s/config.yaml && systemctl restart k3s && sleep 15 && systemctl is-active k3s'" \
            && echo "==> k3s TLS SAN updated and service restarted" \
            || echo "WARNING: SSH to fix TLS SAN failed"

          # Fetch fresh kubeconfig via SSH (preferred over stored secret)
          echo "=== Fetching fresh kubeconfig from k3s ==="
          FRESH_KUBE=$(ssh -i ~/.ssh/farmersmk.pem \
            -o StrictHostKeyChecking=no \
            -o ConnectTimeout=20 \
            ec2-user@"$K8S_SERVER_IP" \
            "sudo cat /etc/rancher/k3s/k3s.yaml" 2>/dev/null) || true

          if [ -n "$FRESH_KUBE" ]; then
            echo "$FRESH_KUBE" | sed "s|server: https://127.0.0.1:6443|server: https://$K8S_SERVER_IP:6443|g" > ~/.kube/config
            echo "==> Using fresh kubeconfig from k3s host"
          elif [ -n "$K8S_KUBECONFIG" ]; then
            echo "==> SSH fetch failed — using K8S_KUBECONFIG secret (may have stale IP)"
            printf '%s' "$K8S_KUBECONFIG" | base64 -d > ~/.kube/config
            # Patch IP in fallback config
            sed -i "s|https://[0-9.]*:6443|https://$K8S_SERVER_IP:6443|g" ~/.kube/config
          else
            echo "ERROR: No kubeconfig available (SSH failed and K8S_KUBECONFIG not set)"
            exit 1
          fi
          chmod 600 ~/.kube/config
          echo "=== Server URL in kubeconfig ==="
          grep server ~/.kube/config
      - name: Self-heal k3s EC2 if impaired
        if: steps.k8s-check.outputs.skip == 'false'
        run: |
          echo "=== Checking k3s EC2 health ==="
          STATUS=$(aws ec2 describe-instance-status \
            --instance-ids "$K8S_INSTANCE_ID" \
            --include-all-instances \
            --query "InstanceStatuses[0].InstanceStatus.Status" \
            --output text 2>/dev/null || echo "unknown")
          echo "Instance status: $STATUS"

          if [ "$STATUS" = "impaired" ]; then
            echo "==> EC2 impaired — rebooting via AWS CLI..."
            aws ec2 reboot-instances --instance-ids "$K8S_INSTANCE_ID"
            echo "Waiting 90s for reboot to complete..."
            sleep 90
          fi

          # Try to reach port 6443 — if not open, restart k3s via SSH
          echo "=== Testing k3s port 6443 ==="
          if ! nc -z -w10 "$K8S_SERVER_IP" 6443 2>/dev/null; then
            echo "Port 6443 not open — restarting k3s via SSH..."
            for i in $(seq 1 20); do
              if ssh -i ~/.ssh/farmersmk.pem \
                   -o StrictHostKeyChecking=no \
                   -o ConnectTimeout=15 \
                   -o BatchMode=yes \
                   ec2-user@"$K8S_SERVER_IP" \
                   "sudo systemctl restart k3s && sleep 5 && sudo systemctl is-active k3s" 2>/dev/null | grep -q active; then
                echo "k3s restarted successfully"
                break
              fi
              echo "SSH attempt $i/20 — retrying in 15s"
              sleep 15
            done
          else
            echo "Port 6443 open — k3s already running"
          fi
      - name: Wait for k3s API ready (up to 5 min)
        if: steps.k8s-check.outputs.skip == 'false'
        run: |
          echo "=== Waiting for k3s API ==="
          for i in $(seq 1 30); do
            if kubectl cluster-info --request-timeout=8s 2>/dev/null; then
              echo "k3s API is ready!"
              break
            fi
            echo "Waiting for k3s API... attempt $i/30"
            sleep 10
          done
          # Final check — fail clearly if still not ready
          kubectl cluster-info --request-timeout=10s
      - name: Install nginx-ingress controller (idempotent)
        if: steps.k8s-check.outputs.skip == 'false'
        run: |
          kubectl apply -f https://raw.githubusercontent.com/kubernetes/ingress-nginx/controller-v1.10.1/deploy/static/provider/baremetal/deploy.yaml || true
          kubectl wait --namespace ingress-nginx \
            --for=condition=ready pod \
            --selector=app.kubernetes.io/component=controller \
            --timeout=120s || true
      - name: Apply farmersMK manifests
        if: steps.k8s-check.outputs.skip == 'false'
        run: kubectl apply -k kubernetes/ --validate=false
      - name: Rollout restart all deployments
        if: steps.k8s-check.outputs.skip == 'false'
        run: kubectl rollout restart deployment -n farmersmk || true
      - name: Wait for rollout
        if: steps.k8s-check.outputs.skip == 'false'
        run: kubectl rollout status deployment -n farmersmk --timeout=300s || true

  # ── 8. Deploy via Ansible + Docker Compose (EC2 app servers) ────────────────
  # Secrets: ANSIBLE_SSH_KEY, ANSIBLE_HOST_1 (e.g. 98.92.240.160), ANSIBLE_HOST_2 (e.g. 3.222.188.212)
  deploy-compose:
    name: Deploy via Ansible (EC2)
    needs: [docker-services, docker-frontend]
    if: github.ref == 'refs/heads/master' || github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest
    continue-on-error: true   # non-fatal: requires ANSIBLE_SSH_KEY / ANSIBLE_HOST_* secrets
    environment: production
    steps:
      - uses: actions/checkout@v4
      - name: Check Ansible secrets
        id: ansible-check
        env:
          ANSIBLE_SSH_KEY: ${{ secrets.ANSIBLE_SSH_KEY }}
          ANSIBLE_HOST_1: ${{ secrets.ANSIBLE_HOST_1 }}
        run: |
          if [ -z "$ANSIBLE_SSH_KEY" ] || [ -z "$ANSIBLE_HOST_1" ]; then
            echo "ANSIBLE_SSH_KEY or ANSIBLE_HOST_1 not set — skipping Ansible deploy"
            echo "skip=true" >> "$GITHUB_OUTPUT"
          else
            echo "skip=false" >> "$GITHUB_OUTPUT"
          fi
      - name: Install Ansible
        if: steps.ansible-check.outputs.skip == 'false'
        run: |
          python3 -m pip install --upgrade pip
          pip install ansible boto3
      - name: Write SSH key
        if: steps.ansible-check.outputs.skip == 'false'
        env:
          ANSIBLE_SSH_KEY: ${{ secrets.ANSIBLE_SSH_KEY }}
        run: |
          mkdir -p ~/.ssh
          echo "$ANSIBLE_SSH_KEY" | base64 -d > ~/.ssh/farmersmk.pem
          chmod 600 ~/.ssh/farmersmk.pem
          ssh-keygen -l -f ~/.ssh/farmersmk.pem
      - name: Write dynamic inventory
        if: steps.ansible-check.outputs.skip == 'false'
        run: |
          mkdir -p infrastructure/ansible
          printf '[FarmersMK]\n' > infrastructure/ansible/inventory.ci.ini
          printf 'server1 ansible_host=${{ secrets.ANSIBLE_HOST_1 }} ansible_user=ec2-user ansible_ssh_private_key_file=~/.ssh/farmersmk.pem\n' >> infrastructure/ansible/inventory.ci.ini
          printf 'server2 ansible_host=${{ secrets.ANSIBLE_HOST_2 }} ansible_user=ec2-user ansible_ssh_private_key_file=~/.ssh/farmersmk.pem\n' >> infrastructure/ansible/inventory.ci.ini
      - name: Self-heal Ansible EC2s if impaired
        if: steps.ansible-check.outputs.skip == 'false'
        env:
          AWS_ACCESS_KEY_ID: ${{ secrets.AWS_ACCESS_KEY_ID }}
          AWS_SECRET_ACCESS_KEY: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          AWS_DEFAULT_REGION: us-east-1
          ANSIBLE_INSTANCE_ID: i-0cd5a162a18bae5bb
        run: |
          pip install awscli --quiet
          STATUS=$(aws ec2 describe-instance-status \
            --instance-ids "$ANSIBLE_INSTANCE_ID" \
            --include-all-instances \
            --query "InstanceStatuses[0].InstanceStatus.Status" \
            --output text 2>/dev/null || echo "unknown")
          echo "Ansible EC2 status: $STATUS"
          if [ "$STATUS" = "impaired" ]; then
            echo "==> Ansible EC2 impaired — rebooting..."
            aws ec2 reboot-instances --instance-ids "$ANSIBLE_INSTANCE_ID"
            echo "Waiting 90s for reboot..."
            sleep 90
          fi
      - name: Wait for Ansible hosts SSH ready (up to 5 min)
        if: steps.ansible-check.outputs.skip == 'false'
        run: |
          for host in "${{ secrets.ANSIBLE_HOST_1 }}" "${{ secrets.ANSIBLE_HOST_2 }}"; do
            echo "=== Waiting for SSH on $host ==="
            for i in $(seq 1 20); do
              if ssh -i ~/.ssh/farmersmk.pem \
                   -o StrictHostKeyChecking=no \
                   -o ConnectTimeout=15 \
                   -o BatchMode=yes \
                   ec2-user@$host "echo ok" 2>/dev/null; then
                echo "$host is ready"
                break
              fi
              echo "  attempt $i/20 — retrying in 15s"
              sleep 15
            done
          done
      - name: Run Ansible playbook
        if: steps.ansible-check.outputs.skip == 'false'
        run: |
          cd infrastructure/ansible
          ansible-playbook -i inventory.ci.ini site.yml \
            --extra-vars "docker_username=${{ secrets.DOCKERHUB_USERNAME }} docker_password=${{ secrets.DOCKERHUB_TOKEN }}" \
            --ssh-extra-args="-o StrictHostKeyChecking=no -o ConnectTimeout=30 -o ServerAliveInterval=60 -o ServerAliveCountMax=5"
